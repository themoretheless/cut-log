name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Check version
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: |
          VERSION=$(node -p 'require("./version.json").version')
          LATEST=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1 | sed 's/^v//' || echo "0.0.0")

          # Check if code files changed (not just CI/docs)
          CODE_CHANGED=$(git diff --name-only origin/main...HEAD \
            | grep -v '^\.github/' \
            | grep -v '^\.vscode/' \
            | grep -v '^\.claude/' \
            | grep -v '^\.gitignore' \
            | grep -v '^README' \
            | grep -v '^LICENSE' \
            | grep -v '^CHANGELOG' \
            | grep -v '^\.env' \
            | grep -v '\.md$' \
            || true)

          if [ -n "$CODE_CHANGED" ]; then
            if git tag -l "v${VERSION}" | grep -q .; then
              echo "::error::v${VERSION} already released. Bump version.json."
              exit 1
            fi
            if [ "$(printf '%s\n' "$LATEST" "$VERSION" | sort -V | tail -1)" != "$VERSION" ]; then
              echo "::error::v${VERSION} is less than latest release v${LATEST}. Version must be higher."
              exit 1
            fi
            echo "New version v${VERSION} (latest: v${LATEST})"
          else
            echo "No code changes, version bump not required"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache tools
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            ~/.cargo/bin/wasm-opt
          key: ${{ runner.os }}-tools

      - name: Install wasm-pack
        run: which wasm-pack || cargo install wasm-pack --locked

      - name: Run Rust tests
        run: cargo test -p cutter-core

      - name: Build WASM
        working-directory: crates/wasm
        run: wasm-pack build --target web --release

      - name: Install wasm-opt
        run: which wasm-opt || cargo install wasm-opt --locked

      - name: Optimize WASM
        run: |
          wasm-opt -Oz --enable-bulk-memory \
            crates/wasm/pkg/cutter_wasm_bg.wasm \
            -o crates/wasm/pkg/cutter_wasm_bg.wasm
          ls -lh crates/wasm/pkg/cutter_wasm_bg.wasm

      - name: Copy WASM to frontend
        run: |
          mkdir -p frontend/wasm frontend/public
          cp -r crates/wasm/pkg/* frontend/wasm/
          cp crates/wasm/pkg/cutter_wasm_bg.wasm frontend/public/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Vue
        working-directory: frontend
        run: npx vite build
        env:
          VITE_APP_VERSION: ${{ inputs.ref || '' }}
          VITE_APP_SHA: ${{ github.sha }}

      - name: SPA fallback for GitHub Pages
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

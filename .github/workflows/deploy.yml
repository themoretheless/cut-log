name: Deploy

on:
  workflow_dispatch:
    inputs:
      source:
        description: "What to deploy"
        required: true
        type: choice
        options:
          - current-branch
          - release
      release:
        description: "Release tag (only for 'release', e.g. v*.*.*)"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve ref
        id: ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.source }}" = "current-branch" ]; then
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "Deploying branch: ${{ github.ref_name }}"
          else
            TAG="${{ inputs.release }}"
            if [ -z "$TAG" ]; then
              echo "::notice::Available releases:"
              gh release list --limit 10
              echo "::error::Specify release tag."
              exit 1
            fi
            if ! gh release view "$TAG" > /dev/null 2>&1; then
              echo "::error::Release '$TAG' not found. Available:"
              gh release list --limit 10
              exit 1
            fi
            echo "ref=$TAG" >> $GITHUB_OUTPUT
            echo "Deploying release: $TAG"
          fi

  build:
    needs: resolve
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.resolve.outputs.ref }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

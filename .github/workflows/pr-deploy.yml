name: PR Deploy

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/deploy')
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.pr.outputs.branch }}
    steps:
      - name: Get PR branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.ref')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          gh pr comment ${{ github.event.issue.number }} -b "🚀 Deploying branch \`$BRANCH\`..."

  build:
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.prepare.outputs.branch }}

  deploy:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      - uses: actions/checkout@v4

      - name: Comment result
        env:
          GH_TOKEN: ${{ github.token }}
          URL: ${{ steps.deployment.outputs.page_url }}
        run: gh pr comment ${{ github.event.issue.number }} -b "✅ Deployed! $URL"

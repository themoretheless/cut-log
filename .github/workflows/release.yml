name: Release
run-name: "Release: ${{ github.event.head_commit.message || github.ref_name }}"

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p 'require("./version.json").version')
          IS_PRE=${{ inputs.prerelease || 'false' }}
          if [ "$IS_PRE" = "true" ]; then
            TAG="v${VERSION}-rc.$(date +%Y%m%d%H%M%S)"
          else
            TAG="v${VERSION}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_pre=$IS_PRE" >> $GITHUB_OUTPUT

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version v${VERSION} already released, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download build artifact
        if: steps.version.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: .

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.is_pre == 'true' }}
          generate_release_notes: true
          files: artifact.tar

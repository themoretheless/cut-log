name: Release & Deploy

# 1) Push в main → билд, тесты, релиз (если новая версия), деплой
# 2) Ручной запуск из PR → пререлиз + деплой
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create as pre-release"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-test:
    uses: ./.github/workflows/build.yml

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p 'require("./version.json").version')
          IS_PRE=${{ inputs.prerelease || 'false' }}
          if [ "$IS_PRE" = "true" ]; then
            TAG="v${VERSION}-rc.$(date +%Y%m%d%H%M%S)"
          else
            TAG="v${VERSION}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_pre=$IS_PRE" >> $GITHUB_OUTPUT

      - name: Ensure version is new
        run: |
          VERSION=$(node -p 'require("./version.json").version')
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists. Bump version in version.json before merging."
            exit 1
          fi

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.is_pre == 'true' }}
          generate_release_notes: true

  deploy:
    needs: [build-and-test, release]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
